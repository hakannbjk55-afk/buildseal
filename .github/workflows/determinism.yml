name: Determinism Matrix Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Basic determinism
        run: python tests/run_determinism_test.py

      - name: Edge cases
        run: python tests/edge_cases_test.py

      - name: Big file determinism
        run: python tests/big_test.py

      - name: Invalid UTF-8 reject
        run: python tests/invalid_utf8_test.py

      - name: JCS strict tests
        run: python tests/jcs_strict_test.py
